[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]
fs_permissions = [{ access = "read", path = "./test/artifacts" }]

[rpc_endpoints]
monad = "https://testnet-rpc.monad.xyz"
